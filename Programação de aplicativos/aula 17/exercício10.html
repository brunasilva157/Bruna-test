<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>

    <header>
        <h1>Gestão de clientes</h1>
    </header>

    <main>
        <section id="listagem">
            <h2>Lista de clientes</h2>
            
            <table border="1"> <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Bruna</td>
                        <td>
                            <button type button>Editar</button>
                            <button type button>Excluir</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Brianca</td>
                        <td>
                            <button type button>Editar</button>
                            <button type button>Excluir</button>
                        </td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Brenda</td>
                        <td>
                            <button type button>Editar</button>
                            <button type button>Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </section>
        <section id="cadastro">
            <h2>Cadastro</h2>
                <form action="/salvar" method="POST">
                <input type="hidden" name="id" value="">
    
                <label for="nome do paciente">Nome completo:</label>
                <input type="text" id="nome" name="nome_paciente" required>
    
                <label for="data de nascimento">Data de nascimento:</label>
                <input type="text" id="nascimento" name="valor_venda" min="1900-01-01" max="2026-04-09" placeholder="00.00.0000" 
                pattern="\d{2}\.\d{2}\.\d{4}" title="Digite a data no formato: 00.00.0000" required>

                <label for="CPF">CPF:</label>
                <input type="text" id="cpf" name="cpf_paciente" placeholder="000.000.000-00" 
                pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite o CPF no formato: 000.000.000-00" required>
    
                <button type="submit">Salvar</button>
          </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Sistema da Bruna</p>
    </footer>

</body>
</html>
