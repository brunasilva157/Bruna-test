<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A PORRA FICO SERIA 69</title>
</head>
<body>

    <main>
        <h1>Atividade 6</h1>
        
        <form action="/salvar" method="POST">

            <p>
                <label for="produto">Produto vendido:</label>
                <input type="text" id="produto" name="nome_produto" required>
            </p>

            <p>
                <label for="valor">Valor da venda (R$):</label> 
                <input type="number" id="valor" name="valor_venda" step="0.01" required>
            </p>
            
            <button type="submit">CADASTRAR VENDA</button>

        </form>
    </main> 

</body>
</html>
