<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>

    <header>
        <h1>Gestão de pacientes</h1>
    </header>

    <main>
        <section id="edicao-paciente">
            <h2>Editar Dados do Paciente</h2>
            
            <form action="#" method="POST">
                <input type="hidden" name="id" value="10">

                <div>
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome_completo" value="Rune Ziin" required>
                </div>

                <br>

                <div>
                    <label for="nascimento">Data de Nascimento:</label>
                    <input type="date" id="nascimento" name="data_nascimento" value="2005-03-09" required>
                </div>

                <br>

                <div>
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf_paciente" value="123.456.789-00" required>
                </div>

                <br>

                <button type="submit">Salvar Alterações</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Sistema da Bruna</p>
    </footer>

</body>
</html>
