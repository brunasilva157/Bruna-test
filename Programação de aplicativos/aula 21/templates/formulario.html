<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Filme</title>
</head>
<body>
    <h1>Cadastrar Novo Filme</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p style="color: red;">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form action="/salvar_filme" method="POST">
        <label>Título:</label><br>
        <input type="text" name="titulo" required><br><br>

        <label>Gênero:</label><br>
        <input type="text" name="genero" required><br><br>

        <label>Tempo (min):</label><br>
        <input type="text" name="tempo" required><br><br>

        <button type="submit">Gravar Filme</button>
    </form>
</body>
</html>
