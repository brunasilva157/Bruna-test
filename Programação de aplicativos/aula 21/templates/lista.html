<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Filmes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .dashboard-container { width: 80%; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: left; }
        th { background-color: #fcfcfc; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Filmes Cadastrados</h2>

        {% if filmes|length > 0 %}
            <table>
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Gênero</th>
                        <th>Duração</th>
                    </tr>
                </thead>
                <tbody>
                    {% for filme in filmes %}
                        <tr>
                            <td>{{ filme.titulo }}</td>
                            <td>{{ filme.genero }}</td>
                            <td>{{ filme.tempo }} min</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        {% else %}
            <p>Nenhum filme cadastrado.</p>
        {% endif %}
        <br>
        <a href="{{ url_for('index') }}">Voltar ao Cadastro</a>
    </div>
</body>
</html>
